version: '3.8'

services:
  # 1. MLflow Tracking Server
  mlflow-server:
    image: python:3.10-slim
    container_name: mlflow_server
    ports:
      - "5000:5000"
    working_dir: /app
    volumes:
      # Mount the current local directory to access the existing mlflow.db and mlruns folder
      - .:/app 
    networks:
      - mlops_network
    command: >
      bash -c "pip install mlflow==2.10.2 &&
      mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns --host 0.0.0.0 --port 5000"

  # 2. Model Inference API
  api-service:
    build: .
    container_name: flight_delay_api
    ports:
      - "8000:8000"
    working_dir: /app
    environment:
      # Utilize Service Discovery to communicate with the MLflow container
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - MODEL_NAME=FlightDelayModel
      - MODEL_STAGE=Production
    volumes:
      # Mount the current directory to enable live code updates (optional)
      - .:/app
    depends_on:
      - mlflow-server
    networks:
      - mlops_network

networks:
  mlops_network:
    driver: bridge
    name: mlops_custom_bridge