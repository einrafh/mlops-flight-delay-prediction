version: '3.8'

services:
  # 1. MLflow Tracking Server
  mlflow-server:
    image: python:3.10-slim
    container_name: mlflow_server
    ports:
      - "5000:5000"
    working_dir: /app
    volumes:
      - mlflow_data:/app 
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    networks:
      - mlops_network
    command: >
      bash -c "pip install mlflow &&
      mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root mlflow-artifacts:/ --host 0.0.0.0 --port 5000"

  # 2. Model Inference API
  api-service:
    build: .
    image: mlops-flight-delay-prediction-api-service
    deploy:
      replicas: 3
    ports:
      - "8000-8002:8000"
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    depends_on:
      - mlflow-server
    networks:
      - mlops_network
    command: uvicorn src.serve:app --host 0.0.0.0 --port 8000
  
  # 3. Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - mlops_network

  # 4. Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    networks:
      - mlops_network
    depends_on:
      - prometheus

networks:
  mlops_network:
    driver: bridge
    name: mlops_custom_bridge

volumes:
  mlflow_data: