name: Continuous Integration and Continuous Deployment (MLOps)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  mlops-pipeline:
    name: MLOps Automated Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Install Required Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn mlflow pytest requests python-dotenv

      - name: 4. Phase 1 - Automated Unit Testing
        run: |
          echo "Running unit tests via Pytest..."
          pytest tests/ -v

      - name: 5. Phase 2 - Data Ingestion and Preprocessing
        env:
          # Ensure this secret is configured in your GitHub Repository settings
          AVIATIONSTACK_API_KEY: ${{ secrets.AVIATIONSTACK_API_KEY }}
        run: |
          echo "Initiating data ingestion pipeline..."
          python src/ingest_data.py
          
          echo "Initiating data preprocessing pipeline..."
          python src/preprocess.py

      - name: 6. Phase 3 & 4 - Automated Training, Evaluation, and Registry
        run: |
          echo "Initiating model training and automated registry evaluation..."
          python src/train.py --n_estimators 200 --max_depth 20